<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- MÁGICA DA TELA CHEIA: Este código obriga o Android a abrir como App -->
    <link rel="manifest" href='data:application/manifest+json,%7B%22name%22%3A%22Tramal%22%2C%22short_name%22%3A%22Tramal%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f8fafc%22%2C%22theme_color%22%3A%22%230f172a%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F2854%2F2854333.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D'>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <title>TRAMAL</title>
    
    <!-- Bibliotecas Necessárias (Sem usar 'import') -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <!-- Ícones FontAwesome (Mais estável que o Lucide para HTML puro) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
            background-color: #f8fafc;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ATENÇÃO: NENHUM 'IMPORT' AQUI! Extraímos as funções diretamente do React e Recharts carregados acima.
        const { useState, useEffect, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, ResponsiveContainer, Cell, LabelList } = Recharts;

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            
            // Dados guardados no telemóvel (Local Storage - Sem problemas de Firebase)
            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem('tramal_app_logs');
                return saved ? JSON.parse(saved) : {};
            });
            const [replenishments, setReplenishments] = useState(() => {
                const saved = localStorage.getItem('tramal_app_supply');
                return saved ? JSON.parse(saved) : [];
            });

            const [savingId, setSavingId] = useState(null);
            const [showSupplyModal, setShowSupplyModal] = useState(false);
            const [supplyAmount, setSupplyAmount] = useState('');
            const [isTyping, setIsTyping] = useState(false); // Esconde rodapé no teclado
            const [editingId, setEditingId] = useState(null);
            const [editData, setEditData] = useState({ d1: 0, d2: 0, d3: 0 });

            const estoqueInicialBase = 54;

            // Salvar automaticamente no Telemóvel
            useEffect(() => { localStorage.setItem('tramal_app_logs', JSON.stringify(logs)); }, [logs]);
            useEffect(() => { localStorage.setItem('tramal_app_supply', JSON.stringify(replenishments)); }, [replenishments]);

            const stats = useMemo(() => {
                const allEntries = Object.values(logs);
                const totalSaida = allEntries.reduce((acc, curr) => acc + (Number(curr.d1) || 0) + (Number(curr.d2) || 0) + (Number(curr.d3) || 0), 0);
                const totalEntrada = replenishments.reduce((acc, curr) => acc + (Number(curr.amount) || 0), 0);
                
                const today = new Date(); today.setHours(0,0,0,0);
                const sevenDaysAgo = new Date(today); sevenDaysAgo.setDate(today.getDate() - 6);

                const total7Dias = allEntries.reduce((acc, curr) => {
                    const d = new Date(curr.data + 'T00:00:00');
                    return (d >= sevenDaysAgo && d <= today) ? acc + (Number(curr.d1) || 0) + (Number(curr.d2) || 0) + (Number(curr.d3) || 0) : acc;
                }, 0);

                return { estoque: estoqueInicialBase + totalEntrada - totalSaida, total7Dias };
            }, [logs, replenishments]);

            const chartData = useMemo(() => {
                const data = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(); d.setDate(d.getDate() - i);
                    const ds = d.toISOString().split('T')[0];
                    const log = logs[ds] || {};
                    data.push({
                        name: d.toLocaleDateString('pt-BR', { day: '2-digit' }),
                        Total: (Number(log.d1) || 0) + (Number(log.d2) || 0) + (Number(log.d3) || 0)
                    });
                }
                return data;
            }, [logs]);

            const calendarDays = useMemo(() => {
                const days = [];
                const today = new Date(); today.setHours(0,0,0,0);
                for (let i = 0; i <= 30; i++) {
                    const d = new Date(today); d.setDate(today.getDate() + i);
                    days.push({
                        dateStr: d.toISOString().split('T')[0],
                        label: d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }),
                        isToday: i === 0
                    });
                }
                return days;
            }, []);

            const historyLogs = useMemo(() => {
                const thirty = new Date(); thirty.setDate(thirty.getDate() - 30);
                return Object.values(logs)
                    .filter(l => new Date(l.data + 'T00:00:00') >= thirty)
                    .sort((a,b) => b.data.localeCompare(a.data));
            }, [logs]);

            const triggerSave = (dateStr) => {
                setSavingId(dateStr);
                setTimeout(() => setSavingId(null), 1000);
            };

            const handleInputChange = (dateStr, field, value) => {
                const curr = logs[dateStr] || { d1: '', d2: '', d3: '', data: dateStr };
                setLogs({...logs, [dateStr]: { ...curr, [field]: value === '' ? '' : Number(value) }});
            };

            const handleSupply = () => {
                if (!supplyAmount) return;
                setReplenishments([...replenishments, { amount: Number(supplyAmount), date: new Date().toISOString(), id: Date.now() }]);
                setSupplyAmount(''); setShowSupplyModal(false);
            };

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(()=>{});
                } else {
                    document.exitFullscreen().catch(()=>{});
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    
                    {/* CABEÇALHO CLARO ESTILO V14 */}
                    <header className="bg-slate-900 text-white pt-8 pb-10 px-6 rounded-b-[3.5rem] shadow-2xl sticky top-0 z-40 border-b-4 border-emerald-500">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-4xl font-black italic tracking-tighter leading-none mb-1">TRAMAL</h1>
                                <p className="text-xs font-black text-emerald-500 uppercase tracking-[0.2em]">Gerenciamento de Doses</p>
                            </div>
                            <div className={`p-3 px-5 rounded-[2rem] border-2 backdrop-blur-md transition-colors ${stats.estoque < 0 ? 'bg-rose-500/10 border-rose-500 text-rose-500' : 'bg-emerald-500/10 border-emerald-500 text-emerald-500'}`}>
                                <span className="block text-[8px] font-black uppercase text-center opacity-60">Estoque</span>
                                <span className="text-3xl font-black leading-none">{stats.estoque}</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto px-4 -mt-4 relative z-10">
                        
                        {/* TAB DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-4 animate-fade pt-2">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col justify-between aspect-square">
                                        <div>
                                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Últimos 7 Dias</p>
                                            <p className="text-4xl font-black text-indigo-600">{stats.total7Dias}</p>
                                        </div>
                                        <div className="bg-indigo-50 text-indigo-700 py-2 rounded-xl text-center text-[9px] font-black uppercase tracking-widest">Cápsulas</div>
                                    </div>
                                    <div className="bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col justify-between aspect-square">
                                        <div>
                                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Estoque Total</p>
                                            <p className={`text-4xl font-black ${stats.estoque < 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{stats.estoque}</p>
                                        </div>
                                        <button onClick={() => setShowSupplyModal(true)} className="bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black flex items-center justify-center active:scale-95 transition-all shadow-lg">
                                            <i className="fa-solid fa-plus mr-2 text-emerald-400"></i> ABASTECER
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-8 flex items-center">
                                        <i className="fa-solid fa-chart-line mr-2 text-indigo-500"></i> Histórico Semanal (Cápsulas)
                                    </h3>
                                    <div className="h-60 w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={chartData} margin={{ top: 20, right: 5, left: -30, bottom: 0 }}>
                                                <XAxis dataKey="name" fontSize={10} axisLine={false} tickLine={false} tick={{fill: '#94a3b8', fontWeight: 'bold'}} />
                                                <Bar dataKey="Total" radius={[8, 8, 0, 0]} barSize={35}>
                                                    {chartData.map((e, i) => <Cell key={i} fill={e.Total > 0 ? '#6366f1' : '#f1f5f9'} />)}
                                                    <LabelList dataKey="Total" position="top" style={{ fill: '#1e293b', fontSize: 12, fontWeight: '900' }} formatter={v => v > 0 ? v : ''} />
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                                
                                <button onClick={toggleFullscreen} className="w-full bg-white border border-slate-200 text-slate-400 py-4 rounded-[2rem] text-[10px] font-black uppercase tracking-[0.3em] flex items-center justify-center active:scale-95 transition-all">
                                    <i className="fa-solid fa-expand mr-2"></i> Forçar Ecrã Total
                                </button>
                            </div>
                        )}

                        {/* TAB LANÇAR */}
                        {activeTab === 'agenda' && (
                            <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden mt-4 animate-fade">
                                <div className="p-5 bg-slate-900 text-white flex justify-between items-center">
                                    <h2 className="text-[10px] font-black uppercase tracking-widest flex items-center text-emerald-400">
                                        <i className="fa-solid fa-list-ul mr-2"></i> Grade 3 Doses
                                    </h2>
                                    {savingId && <div className="animate-pulse flex items-center text-[8px] font-black text-emerald-400"><i className="fa-solid fa-cloud-arrow-up mr-1"></i> SALVANDO...</div>}
                                </div>
                                
                                <div className="p-1 px-2">
                                    <div className="grid grid-cols-5 gap-1 text-[8px] font-black text-slate-400 uppercase text-center mb-2 mt-2">
                                        <div className="text-left pl-1">Data</div><div>D1</div><div>D2</div><div>D3</div><div>Total</div>
                                    </div>
                                    <div className="space-y-1 max-h-[60vh] overflow-y-auto pr-1 pb-4 scrollbar-hide">
                                        {calendarDays.map((day) => {
                                            const log = logs[day.dateStr] || { d1: '', d2: '', d3: '' };
                                            const total = (Number(log.d1) || 0) + (Number(log.d2) || 0) + (Number(log.d3) || 0);
                                            const isSaved = savingId === day.dateStr;

                                            return (
                                                <div key={day.dateStr} className={`grid grid-cols-5 gap-1 items-center p-1 py-2 rounded-xl transition-colors ${day.isToday ? 'bg-emerald-50 border border-emerald-100' : 'hover:bg-slate-50'}`}>
                                                    <div className={`text-[10px] font-bold pl-1 ${day.isToday ? 'text-emerald-700' : 'text-slate-500'}`}>
                                                        {day.label}
                                                    </div>
                                                    <input 
                                                        type="number" placeholder="-"
                                                        className="w-full py-2 text-center bg-yellow-50 border border-yellow-200 rounded-lg text-[13px] font-black text-slate-800 focus:bg-white focus:ring-1 focus:ring-yellow-400 transition-all placeholder:text-yellow-200"
                                                        value={log.d1}
                                                        onFocus={() => setIsTyping(true)}
                                                        onBlur={() => { setIsTyping(false); triggerSave(day.dateStr); }}
                                                        onChange={(e) => handleInputChange(day.dateStr, 'd1', e.target.value)}
                                                    />
                                                    <input 
                                                        type="number" placeholder="-"
                                                        className="w-full py-2 text-center bg-yellow-50 border border-yellow-200 rounded-lg text-[13px] font-black text-slate-800 focus:bg-white focus:ring-1 focus:ring-yellow-400 transition-all placeholder:text-yellow-200"
                                                        value={log.d2}
                                                        onFocus={() => setIsTyping(true)}
                                                        onBlur={() => { setIsTyping(false); triggerSave(day.dateStr); }}
                                                        onChange={(e) => handleInputChange(day.dateStr, 'd2', e.target.value)}
                                                    />
                                                    <input 
                                                        type="number" placeholder="-"
                                                        className="w-full py-2 text-center bg-yellow-50 border border-yellow-200 rounded-lg text-[13px] font-black text-slate-800 focus:bg-white focus:ring-1 focus:ring-yellow-400 transition-all placeholder:text-yellow-200"
                                                        value={log.d3}
                                                        onFocus={() => setIsTyping(true)}
                                                        onBlur={() => { setIsTyping(false); triggerSave(day.dateStr); }}
                                                        onChange={(e) => handleInputChange(day.dateStr, 'd3', e.target.value)}
                                                    />
                                                    <div className="text-center relative">
                                                        <span className={`text-[13px] font-black px-2 py-1 rounded-lg shadow-sm inline-block min-w-[28px] ${total > 0 ? 'bg-black text-white' : 'bg-slate-100 text-slate-300'}`}>
                                                            {total}
                                                        </span>
                                                        {isSaved && <i className="fa-solid fa-circle-check absolute -top-1 -right-1 text-emerald-500 text-[10px]"></i>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB HISTÓRICO */}
                        {activeTab === 'history' && (
                            <div className="space-y-3 animate-fade pt-4">
                                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] px-2 mb-4">Histórico 30 Dias</h2>
                                {historyLogs.length === 0 && <p className="text-center text-slate-400 font-bold py-10">Nenhum registo de doses.</p>}
                                {historyLogs.map(log => (
                                    <div key={log.data} className="bg-white p-4 rounded-[2rem] shadow-sm border border-slate-100 flex items-center justify-between">
                                        <div className="flex items-center flex-1">
                                            <div className="h-12 w-12 rounded-2xl bg-slate-900 text-emerald-400 flex flex-col items-center justify-center mr-4 shadow-lg shrink-0">
                                                <span className="text-[10px] font-bold uppercase opacity-60 leading-none">{new Date(log.data + 'T00:00:00').toLocaleDateString('pt-BR', { month: 'short' })}</span>
                                                <span className="text-lg font-black leading-none">{log.data.split('-')[2]}</span>
                                            </div>
                                            
                                            {editingId === log.data ? (
                                                <div className="flex space-x-1 flex-1">
                                                    <input type="number" className="w-10 p-1 text-center bg-yellow-50 rounded-lg font-black text-xs border border-yellow-200" value={editData.d1} onChange={(e) => setEditData({...editData, d1: Number(e.target.value)})} />
                                                    <input type="number" className="w-10 p-1 text-center bg-yellow-50 rounded-lg font-black text-xs border border-yellow-200" value={editData.d2} onChange={(e) => setEditData({...editData, d2: Number(e.target.value)})} />
                                                    <input type="number" className="w-10 p-1 text-center bg-yellow-50 rounded-lg font-black text-xs border border-yellow-200" value={editData.d3} onChange={(e) => setEditData({...editData, d3: Number(e.target.value)})} />
                                                </div>
                                            ) : (
                                                <div>
                                                    <p className="text-xs font-black text-slate-800 capitalize leading-none mb-1">
                                                        {new Date(log.data + 'T00:00:00').toLocaleDateString('pt-BR', { weekday: 'long' })}
                                                    </p>
                                                    <div className="flex space-x-2">
                                                        <span className="text-[9px] font-bold text-slate-400 bg-slate-50 px-2 py-0.5 rounded-md">Total: {(log.d1||0) + (log.d2||0) + (log.d3||0)} cápsulas</span>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                        
                                        <div className="flex space-x-1 shrink-0 ml-2">
                                            {editingId === log.data ? (
                                                <React.Fragment>
                                                    <button onClick={() => { setLogs({...logs, [log.data]: {...logs[log.data], ...editData}}); setEditingId(null); }} className="p-3 text-emerald-600 bg-emerald-50 rounded-xl"><i className="fa-solid fa-floppy-disk"></i></button>
                                                    <button onClick={() => setEditingId(null)} className="p-3 text-rose-600 bg-rose-50 rounded-xl"><i className="fa-solid fa-xmark"></i></button>
                                                </React.Fragment>
                                            ) : (
                                                <React.Fragment>
                                                    <button onClick={() => { setEditingId(log.data); setEditData({d1: log.d1||0, d2: log.d2||0, d3: log.d3||0}); }} className="p-3 text-slate-300 hover:text-indigo-500"><i className="fa-solid fa-pen"></i></button>
                                                    <button onClick={() => { if(window.confirm('Excluir?')) { const n = {...logs}; delete n[log.data]; setLogs(n); } }} className="p-3 text-slate-200 hover:text-rose-500"><i className="fa-solid fa-trash-can"></i></button>
                                                </React.Fragment>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* MODAL ABASTECER */}
                    {showSupplyModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-md">
                            <div className="bg-white w-full max-w-xs rounded-[3rem] p-10 shadow-2xl border-t-8 border-emerald-500 animate-fade">
                                <h2 className="text-2xl font-black text-center italic tracking-tighter mb-8 uppercase">Entrada</h2>
                                <input 
                                    type="number" autoFocus placeholder="0"
                                    className="w-full text-5xl font-black text-center bg-slate-50 border-none rounded-[2rem] py-8 mb-8 text-emerald-600 focus:ring-8 focus:ring-emerald-50 outline-none"
                                    value={supplyAmount} onChange={(e) => setSupplyAmount(e.target.value)}
                                />
                                <div className="flex space-x-3">
                                    <button onClick={() => setShowSupplyModal(false)} className="flex-1 py-4 text-xs font-black text-slate-400">VOLTAR</button>
                                    <button onClick={handleSupply} className="flex-[2] py-4 bg-emerald-600 text-white text-xs font-black rounded-2xl shadow-xl">SALVAR</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NAV INFERIOR (Some ao digitar) */}
                    <nav className={`fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-2xl border-t border-slate-100 flex justify-around items-center py-2 px-6 pb-10 shadow-2xl z-40 transition-transform duration-300 ease-in-out ${isTyping ? 'translate-y-full pointer-events-none' : 'translate-y-0'}`}>
                        <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center p-4 rounded-3xl transition-all ${activeTab === 'dashboard' ? 'text-slate-900 bg-emerald-50 scale-110 shadow-inner' : 'text-slate-400'}`}>
                            <i className="fa-solid fa-house text-xl mb-1"></i>
                            <span className="text-[9px] font-black uppercase tracking-widest">Início</span>
                        </button>
                        <button onClick={() => setActiveTab('agenda')} className={`flex flex-col items-center p-4 rounded-3xl transition-all ${activeTab === 'agenda' ? 'text-slate-900 bg-emerald-50 scale-110 shadow-inner' : 'text-slate-400'}`}>
                            <i className="fa-solid fa-list-ul text-xl mb-1"></i>
                            <span className="text-[9px] font-black uppercase tracking-widest">Lançar</span>
                        </button>
                        <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center p-4 rounded-3xl transition-all ${activeTab === 'history' ? 'text-slate-900 bg-emerald-50 scale-110 shadow-inner' : 'text-slate-400'}`}>
                            <i className="fa-solid fa-clock-rotate-left text-xl mb-1"></i>
                            <span className="text-[9px] font-black uppercase tracking-widest">Logs</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
