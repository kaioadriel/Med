<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href='data:application/manifest+json,%7B%22name%22%3A%22Medicacao%22%2C%22short_name%22%3A%22Medicacao%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f8fafc%22%2C%22theme_color%22%3A%22%230f172a%22%7D'>
    
    <title>MEDICAÇÃO - Gestão Cloud</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
            background-color: #f8fafc;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .tab-active { transform: scale(1.1); color: #0f172a; font-weight: 900; }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- INICIALIZAÇÃO DO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCVuPb0tji1Xd3qgzGsAVW-X4GyRwQpSdo",
            authDomain: "medicacao-afb43.firebaseapp.com",
            projectId: "medicacao-afb43",
            storageBucket: "medicacao-afb43.firebasestorage.app",
            messagingSenderId: "106132279676",
            appId: "1:106132279676:web:eb94017be76a71f67b14f9"
        };

        let db = null;
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        }

        // Ícones em SVG
        const IconHome = () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
        const IconTable = () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v18"></path><rect width="18" height="18" x="3" y="3" rx="2"></rect><path d="M3 9h18"></path><path d="M3 15h18"></path></svg>;
        const IconHistory = () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>;
        const IconPlus = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconCheck = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconTrash = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconCloud = () => <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" strokeWidth="2" fill="none"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.4-1.9-4.3-4.2-4.5C17.3 6.6 14.4 4 11 4 7.6 4 4.8 6.6 4.2 10.1 1.9 10.3 0 12.3 0 14.7 0 17.1 1.9 19 4.3 19h13.2Z"/></svg>;
        const IconX = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const IconBag = () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><path d="M3 6h18"></path><path d="M16 10a4 4 0 0 1-8 0"></path></svg>;
        const IconPencil = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
        const IconDownload = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const IconUpload = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;

        const ManualBarChart = ({ data }) => {
            const maxVal = Math.max(...data.map(d => d.Total), 1);
            return (
                <div className="flex items-end justify-between h-full pt-6 pb-2 px-2">
                    {data.map((d, i) => (
                        <div key={i} className="flex flex-col items-center justify-end h-full flex-1">
                            <span className="text-[11px] font-black text-slate-800 mb-1">{d.Total > 0 ? d.Total : ''}</span>
                            <div className="w-full max-w-[28px] rounded-t-lg transition-all duration-500"
                                style={{ height: `${(d.Total / maxVal) * 100}%`, backgroundColor: d.Total > 0 ? '#6366f1' : '#f1f5f9', minHeight: d.Total > 0 ? '6px' : '3px' }}>
                            </div>
                            <span className="text-[9px] font-bold text-slate-400 mt-2">{d.name}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            
            // ESTADOS DE DADOS
            const [syncId] = useState('mestrekaio'); // Chave oculta
            const [status, setStatus] = useState('Local');
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('tramal_app_final_logs') || '{}'));
            const [replenishments, setReplenishments] = useState(() => JSON.parse(localStorage.getItem('tramal_app_final_supply') || '[]'));
            
            const [savingId, setSavingId] = useState(null);
            const [isKeyboardVisible, setIsKeyboardVisible] = useState(false);
            const fileInputRef = useRef(null);

            // Estados da Nova Janela de Compras e Logs (Passadas)
            const [showSupplyModal, setShowSupplyModal] = useState(false);
            const [selectedPurchase, setSelectedPurchase] = useState(null);
            
            const [selectedLog, setSelectedLog] = useState(null);
            const [isEditingLog, setIsEditingLog] = useState(false);
            const [editLogData, setEditLogData] = useState({ d1: '', d2: '', d3: '' });
            
            // Pega a data de hoje formatada (YYYY-MM-DD)
            const getTodayDateStr = () => new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];

            const [supplyData, setSupplyData] = useState({ 
                id: null,
                amount: '', 
                date: getTodayDateStr(), 
                patient: '', 
                pharmacy: '' 
            });

            const estoqueInicialBase = 54;

            // GERENCIADORES DE TECLADO UNIFICADOS
            const onInputFocus = () => setIsKeyboardVisible(true);
            const onInputBlur = () => setTimeout(() => setIsKeyboardVisible(false), 150);

            // SALVAR LOCALMENTE
            useEffect(() => { 
                localStorage.setItem('tramal_app_final_logs', JSON.stringify(logs)); 
                localStorage.setItem('tramal_app_final_supply', JSON.stringify(replenishments));
            }, [logs, replenishments]);

            // SINCRONIZAR COM FIREBASE
            useEffect(() => {
                if (!db || !syncId) {
                    setStatus('Local');
                    return;
                }
                
                setStatus('A sincronizar...');
                const unsub = db.collection('medicacao_users').doc(syncId).onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.logs) setLogs(data.logs);
                        if (data.replenishments) setReplenishments(data.replenishments);
                        setStatus('Nuvem Ativa');
                    } else {
                        setStatus('A criar Nuvem...');
                        db.collection('medicacao_users').doc(syncId).set({ logs, replenishments });
                    }
                }, (error) => {
                    console.error("Erro Firebase:", error);
                    setStatus('Erro Cloud');
                });

                return () => unsub();
            }, [syncId]);

            // FUNÇÃO PARA ATUALIZAR NUVEM
            const updateCloud = (newLogs, newSupply) => {
                if (!db || !syncId) return;
                db.collection('medicacao_users').doc(syncId).update({ 
                    logs: newLogs || logs, 
                    replenishments: newSupply || replenishments 
                }).catch(() => {
                    setStatus('Erro Cloud');
                });
            };

            const stats = useMemo(() => {
                const allEntries = Object.values(logs);
                
                // Soma TODAS as saídas (Passado + Futuro)
                const totalSaidaGeral = allEntries.reduce((acc, curr) => acc + (Number(curr.d1) || 0) + (Number(curr.d2) || 0) + (Number(curr.d3) || 0), 0);
                
                // Calcula a data de HOJE no fuso horário correto
                const todayStr = getTodayDateStr();
                
                // Soma APENAS as saídas até o dia de hoje (Estoque Real)
                const totalSaidaAteHoje = allEntries.reduce((acc, curr) => {
                    if (curr.data <= todayStr) {
                        return acc + (Number(curr.d1) || 0) + (Number(curr.d2) || 0) + (Number(curr.d3) || 0);
                    }
                    return acc;
                }, 0);

                const totalEntrada = replenishments.reduce((acc, curr) => acc + (Number(curr.amount) || 0), 0);
                
                const today = new Date(); today.setHours(0,0,0,0);
                const sevenDaysAgo = new Date(today); sevenDaysAgo.setDate(today.getDate() - 6);
                const total7 = allEntries.reduce((acc, curr) => {
                    const dateObj = new Date(curr.data + 'T12:00:00');
                    return (dateObj >= sevenDaysAgo && dateObj <= today) ? acc + (Number(curr.d1) || 0) + (Number(curr.d2) || 0) + (Number(curr.d3) || 0) : acc;
                }, 0);
                
                return { 
                    previsao: estoqueInicialBase + totalEntrada - totalSaidaGeral, 
                    estoque: estoqueInicialBase + totalEntrada - totalSaidaAteHoje, 
                    total7Dias: total7,
                    totalEntrada
                };
            }, [logs, replenishments]);

            const chartData = useMemo(() => {
                const data = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(); d.setDate(d.getDate() - i);
                    const ds = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
                    const log = logs[ds] || {};
                    data.push({ name: d.toLocaleDateString('pt-BR', { day: '2-digit' }), Total: (Number(log.d1) || 0) + (Number(log.d2) || 0) + (Number(log.d3) || 0) });
                }
                return data;
            }, [logs]);

            const calendarDays = useMemo(() => {
                const days = [];
                for (let i = 0; i <= 30; i++) {
                    const d = new Date(); d.setDate(d.getDate() + i);
                    days.push({ 
                        dateStr: new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0], 
                        label: d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }), 
                        isToday: i === 0 
                    });
                }
                return days;
            }, []);

            const historyLogsList = useMemo(() => {
                const thirty = new Date(); thirty.setDate(thirty.getDate() - 30);
                const todayStr = getTodayDateStr(); // Pega a data de hoje para comparar
                return Object.values(logs)
                    // Mantém apenas os últimos 30 dias E estritamente antes de hoje (l.data < todayStr)
                    .filter(l => new Date(l.data + 'T12:00:00') >= thirty && l.data < todayStr)
                    .sort((a,b) => b.data.localeCompare(a.data));
            }, [logs]);

            const handleInputChange = (dateStr, field, value) => {
                const curr = logs[dateStr] || { d1: '', d2: '', d3: '', data: dateStr };
                const updatedLogs = {...logs, [dateStr]: { ...curr, [field]: value === '' ? '' : Number(value) }};
                setLogs(updatedLogs);
                updateCloud(updatedLogs, null);
            };

            const handleKeyDown = (e, dayIdx, doseIdx) => {
                let nextDay = dayIdx;
                let nextDose = doseIdx;
                switch (e.key) {
                    case 'ArrowUp': nextDay--; break;
                    case 'ArrowDown': nextDay++; break;
                    case 'ArrowLeft': nextDose--; break;
                    case 'ArrowRight': nextDose++; break;
                    default: return;
                }
                const nextEl = document.getElementById(`cell-${nextDay}-${nextDose}`);
                if (nextEl) { e.preventDefault(); nextEl.focus(); }
            };

            const handleClearRow = (dateStr) => {
                const updatedLogs = { ...logs };
                delete updatedLogs[dateStr]; 
                setLogs(updatedLogs);
                updateCloud(updatedLogs, null);
            };

            const handleClearAll = () => {
                setLogs({});
                updateCloud({}, null);
            };

            // FUNÇÕES DE COMPRA (ABASTECER)
            const openNewSupplyModal = () => {
                setSupplyData({ id: null, amount: '', date: getTodayDateStr(), patient: '', pharmacy: '' });
                setShowSupplyModal(true);
            };

            const handleEditPurchase = (compra) => {
                setSupplyData(compra);
                setSelectedPurchase(null);
                setShowSupplyModal(true);
            };

            const handleSupply = () => {
                if (!supplyData.amount) {
                    alert("Por favor, preencha a quantidade.");
                    return;
                }
                
                let updatedReplenishments;
                if (supplyData.id) {
                    // Editar existente
                    updatedReplenishments = replenishments.map(r => 
                        r.id === supplyData.id 
                            ? { ...r, amount: Number(supplyData.amount), date: supplyData.date, patient: supplyData.patient, pharmacy: supplyData.pharmacy } 
                            : r
                    );
                } else {
                    // Novo
                    const newReplenishment = { 
                        amount: Number(supplyData.amount), 
                        date: supplyData.date || getTodayDateStr(), 
                        patient: supplyData.patient || '',
                        pharmacy: supplyData.pharmacy || '',
                        id: Date.now() 
                    };
                    updatedReplenishments = [...replenishments, newReplenishment];
                }
                
                setReplenishments(updatedReplenishments);
                updateCloud(null, updatedReplenishments);
                setSupplyData({ id: null, amount: '', date: getTodayDateStr(), patient: '', pharmacy: '' }); 
                setShowSupplyModal(false);
            };

            // Exclusão Direta (Sem confirmação)
            const deletePurchase = (id) => {
                const updated = replenishments.filter(r => r.id !== id);
                setReplenishments(updated);
                updateCloud(null, updated);
                setSelectedPurchase(null);
            };

            // FUNÇÕES DA ABA PASSADAS (LOGS)
            const openLogDetails = (log) => {
                setSelectedLog(log);
                setIsEditingLog(false);
            };

            const startEditingLog = (log) => {
                setEditLogData({ d1: log.d1 || '', d2: log.d2 || '', d3: log.d3 || '' });
                setIsEditingLog(true);
            };

            const saveLogEdit = () => {
                const dateStr = selectedLog.data;
                const curr = logs[dateStr] || { data: dateStr };
                const updatedLogs = {...logs, [dateStr]: { 
                    ...curr, 
                    d1: editLogData.d1 === '' ? '' : Number(editLogData.d1), 
                    d2: editLogData.d2 === '' ? '' : Number(editLogData.d2), 
                    d3: editLogData.d3 === '' ? '' : Number(editLogData.d3) 
                }};
                setLogs(updatedLogs);
                updateCloud(updatedLogs, null);
                
                // Atualiza a view do modal
                setSelectedLog(updatedLogs[dateStr]);
                setIsEditingLog(false);
            };

            // Exclusão Direta (Sem confirmação)
            const deleteLogRecord = (dateStr) => {
                handleClearRow(dateStr);
                setSelectedLog(null);
            };

            // FUNÇÕES DE BACKUP E RESTAURAR
            const handleBackup = () => {
                const data = JSON.stringify({ logs, replenishments });
                const blob = new Blob([data], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `backup_medicacao_${getTodayDateStr()}.json`;
                a.click();
            };

            const handleRestore = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.logs) { setLogs(data.logs); updateCloud(data.logs, null); }
                        if (data.replenishments) { setReplenishments(data.replenishments); updateCloud(null, data.replenishments); }
                        alert("Backup restaurado com sucesso! Dados sincronizados localmente e na nuvem.");
                    } catch (err) {
                        alert("Erro ao ler o arquivo. Certifique-se de que é um arquivo de backup válido.");
                    }
                };
                reader.readAsText(file);
                e.target.value = ''; // Limpa o input para permitir enviar o mesmo arquivo de novo
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* HEADER */}
                    <header className="bg-slate-900 text-white pt-8 pb-10 px-6 rounded-b-[3.5rem] shadow-2xl sticky top-0 z-40 border-b-4 border-emerald-500">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-4xl font-black italic tracking-tighter leading-none mb-1">MEDICAÇÃO</h1>
                                <div className="flex items-center space-x-1">
                                    <span className={`transition-colors ${status === 'Erro Cloud' ? 'text-rose-500 animate-pulse' : 'text-emerald-500 ' + (status === 'Nuvem Ativa' ? 'animate-pulse' : '')}`}><IconCloud /></span>
                                    <p className={`text-[9px] font-black uppercase tracking-[0.2em] transition-colors ${status === 'Erro Cloud' ? 'text-rose-500' : 'text-emerald-500'}`}>Controle de Doses</p>
                                </div>
                            </div>
                            <div className={`p-3 px-5 rounded-[2rem] border-2 backdrop-blur-md transition-all ${stats.previsao < 0 ? 'bg-rose-500/10 border-rose-500 text-rose-400' : 'bg-emerald-500/10 border-emerald-500 text-emerald-400'}`}>
                                <span className="block text-[8px] font-black uppercase text-center opacity-60">Previsão</span>
                                <span className="text-3xl font-black leading-none">{stats.previsao}</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto px-4 -mt-4 relative z-10 flex-1 w-full pb-32">
                        
                        {/* INÍCIO (DASHBOARD) */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-4 pt-2 animate-fade">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col justify-between aspect-square">
                                        <p className="text-slate-400 text-[10px] font-black uppercase">Últimos 7 Dias</p>
                                        <p className="text-4xl font-black text-indigo-600 leading-none">{stats.total7Dias}</p>
                                        <div className="bg-indigo-50 text-indigo-700 py-2 rounded-xl text-center text-[9px] font-black uppercase tracking-tighter">Cápsulas</div>
                                    </div>
                                    <div className="bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col justify-between aspect-square text-center">
                                        <p className="text-slate-400 text-[10px] font-black uppercase">Estoque</p>
                                        <p className={`text-4xl font-black leading-none ${stats.estoque < 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{stats.estoque}</p>
                                        <button onClick={openNewSupplyModal} className="bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black flex items-center justify-center shadow-lg active:scale-95 transition-all"><span className="mr-1 text-emerald-400"><IconPlus /></span> ABASTECER</button>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Histórico Semanal</h3>
                                    <div className="h-48 w-full"><ManualBarChart data={chartData} /></div>
                                </div>

                                {/* BOTÕES DE BACKUP E RESTAURAR */}
                                <div className="flex space-x-3 pb-2">
                                    <button onClick={handleBackup} className="flex-1 py-4 bg-white border border-slate-200 text-slate-600 rounded-[2rem] text-[10px] font-black uppercase tracking-widest flex items-center justify-center shadow-sm active:scale-95 transition-all">
                                        <span className="mr-2 text-indigo-500"><IconDownload /></span> Backup
                                    </button>
                                    <button onClick={() => fileInputRef.current.click()} className="flex-1 py-4 bg-white border border-slate-200 text-slate-600 rounded-[2rem] text-[10px] font-black uppercase tracking-widest flex items-center justify-center shadow-sm active:scale-95 transition-all">
                                        <span className="mr-2 text-emerald-500"><IconUpload /></span> Restaurar
                                    </button>
                                </div>
                                <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={handleRestore} />
                            </div>
                        )}

                        {/* GRADE DE LANÇAMENTO */}
                        {activeTab === 'agenda' && (
                            <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden mt-4 animate-fade">
                                <div className="p-5 bg-slate-900 text-white flex justify-between items-center">
                                    <h2 className="text-[10px] font-black uppercase tracking-widest text-emerald-400">Grade de Lançamento</h2>
                                    <div className="flex items-center space-x-3">
                                        {savingId && <div className="animate-pulse text-[8px] font-black uppercase text-emerald-400">Gravado</div>}
                                        <button onClick={handleClearAll} className="text-[8px] font-black uppercase text-rose-400 border border-rose-500/50 bg-rose-500/10 px-2 py-1 rounded-lg active:scale-95 transition-all">Limpar Tudo</button>
                                    </div>
                                </div>
                                <div className="p-2">
                                    <div className="grid grid-cols-[1.2fr_1fr_1fr_1fr_0.8fr_24px] gap-1 text-[8px] font-black text-slate-400 uppercase text-center mb-2 mt-2 px-1">
                                        <div className="text-left pl-1">Data</div><div>D1</div><div>D2</div><div>D3</div><div>Tot</div><div></div>
                                    </div>
                                    <div className="space-y-1 max-h-[60vh] overflow-y-auto pr-1 pb-10 scrollbar-hide">
                                        {calendarDays.map((day, dIdx) => {
                                            const log = logs[day.dateStr] || { d1: '', d2: '', d3: '' };
                                            const total = (Number(log.d1)||0) + (Number(log.d2)||0) + (Number(log.d3)||0);
                                            
                                            const totalSaidaAteData = Object.values(logs).reduce((acc, curr) => {
                                                if (curr.data <= day.dateStr) return acc + (Number(curr.d1) || 0) + (Number(curr.d2) || 0) + (Number(curr.d3) || 0);
                                                return acc;
                                            }, 0);
                                            
                                            const runningStock = estoqueInicialBase + stats.totalEntrada - totalSaidaAteData;
                                            
                                            let badgeClass = total > 0 ? 'bg-black text-white' : 'bg-slate-100 text-slate-300';
                                            if (runningStock <= 0) {
                                                badgeClass = 'bg-rose-500 text-white shadow-[0_0_8px_rgba(243,24,70,0.4)]';
                                            }

                                            return (
                                                <div key={day.dateStr} className={`grid grid-cols-[1.2fr_1fr_1fr_1fr_0.8fr_24px] gap-1 items-center p-1 py-1.5 rounded-xl transition-colors ${day.isToday ? 'bg-emerald-50 border border-emerald-100' : ''}`}>
                                                    <div className={`text-[10px] font-bold pl-1 ${day.isToday ? 'text-emerald-700 font-black' : 'text-slate-500'}`}>{day.label}</div>
                                                    {[1,2,3].map((num, doseIdx) => (
                                                        <input 
                                                            key={num} id={`cell-${dIdx}-${doseIdx}`} type="number" placeholder="-" 
                                                            className="w-full py-2 text-center bg-yellow-50 border border-yellow-200 rounded-lg text-[13px] font-black focus:bg-white focus:ring-1 focus:ring-yellow-400 outline-none transition-all" 
                                                            value={log[`d${num}`]} onFocus={onInputFocus} onBlur={()=>{onInputBlur(); setSavingId(day.dateStr); setTimeout(()=>setSavingId(null), 1000)}} onKeyDown={(e) => handleKeyDown(e, dIdx, doseIdx)} onChange={e=>handleInputChange(day.dateStr, `d${num}`, e.target.value)} 
                                                        />
                                                    ))}
                                                    <div className="text-center relative flex items-center justify-center">
                                                        <span className={`text-[13px] font-black px-2 py-1 rounded-lg transition-colors ${badgeClass}`}>{total || '-'}</span>
                                                        {savingId === day.dateStr && <div className="absolute -top-1 -right-1 text-emerald-500"><IconCheck /></div>}
                                                    </div>
                                                    <button onClick={() => handleClearRow(day.dateStr)} className="flex items-center justify-center text-rose-300 hover:text-rose-500 active:scale-90 transition-all p-1" title="Limpar Dia"><IconX /></button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* NOVA ABA: PASSADAS (ANTIGA LOGS) */}
                        {activeTab === 'history' && (
                            <div className="space-y-3 pt-4 animate-fade">
                                <div className="flex justify-between items-center px-2 mb-4">
                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Histórico 30 Dias</h2>
                                    <div className="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-[10px] font-black">{historyLogsList.length} Registros</div>
                                </div>
                                
                                <div className="space-y-3 pb-10">
                                    {historyLogsList.map(log => {
                                        const total = (Number(log.d1)||0) + (Number(log.d2)||0) + (Number(log.d3)||0);
                                        return (
                                            <div key={log.data} className="bg-white p-4 rounded-[2rem] shadow-sm border border-slate-100 flex items-center justify-between">
                                                <div className="flex items-center flex-1">
                                                    <div className="h-12 w-12 rounded-2xl bg-slate-900 text-emerald-400 flex flex-col items-center justify-center mr-4 shadow-sm shrink-0 font-black border border-slate-800">
                                                        {/* Correção do timezone: Adicionado T12:00:00 */}
                                                        <span className="text-[10px] uppercase opacity-70 leading-none">{new Date(log.data + 'T12:00:00').toLocaleDateString('pt-BR', { month: 'short' })}</span>
                                                        <span className="text-lg leading-none">{new Date(log.data + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit' })}</span>
                                                    </div>
                                                    <div>
                                                        <p className="text-xs font-black text-slate-800 leading-none mb-1 uppercase tracking-tighter">
                                                            {total} Cápsulas
                                                        </p>
                                                        {/* Correção do timezone: Adicionado T12:00:00 */}
                                                        <span className="text-[9px] font-bold text-slate-400 block truncate max-w-[150px]">
                                                            {new Date(log.data + 'T12:00:00').toLocaleDateString('pt-BR', { weekday: 'long' })}
                                                        </span>
                                                    </div>
                                                </div>
                                                <button onClick={() => openLogDetails(log)} className="h-10 w-10 bg-slate-900 text-white rounded-xl flex items-center justify-center active:scale-90 transition-all shadow-md ml-2">
                                                    <IconPlus />
                                                </button>
                                            </div>
                                        );
                                    })}
                                    
                                    {historyLogsList.length === 0 && (
                                        <div className="text-center py-10 opacity-50">
                                            <div className="flex justify-center mb-2 text-slate-400"><IconHistory /></div>
                                            <p className="text-xs font-bold text-slate-500">Nenhum registro nos últimos 30 dias.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ABA: COMPRAS */}
                        {activeTab === 'purchases' && (
                            <div className="space-y-3 pt-4 animate-fade">
                                <div className="flex justify-between items-center px-2 mb-4">
                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Histórico de Compras</h2>
                                    <div className="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-black">{replenishments.length} Registros</div>
                                </div>
                                
                                <div className="space-y-3 pb-10">
                                    {[...replenishments].sort((a,b) => new Date(b.date) - new Date(a.date)).map(compra => (
                                        <div key={compra.id} className="bg-white p-4 rounded-[2rem] shadow-sm border border-slate-100 flex items-center justify-between">
                                            <div className="flex items-center flex-1">
                                                <div className="h-12 w-12 rounded-2xl bg-emerald-50 text-emerald-600 flex flex-col items-center justify-center mr-4 shadow-sm shrink-0 font-black border border-emerald-100">
                                                    {/* Correção do timezone: Adicionado T12:00:00 */}
                                                    <span className="text-[10px] uppercase opacity-70 leading-none">{new Date(compra.date + 'T12:00:00').toLocaleDateString('pt-BR', { month: 'short' })}</span>
                                                    <span className="text-lg leading-none">{new Date(compra.date + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit' })}</span>
                                                </div>
                                                <div>
                                                    <p className="text-xs font-black text-slate-800 leading-none mb-1 uppercase tracking-tighter">
                                                        {compra.amount} Cápsulas
                                                    </p>
                                                    <span className="text-[11px] font-bold text-slate-500 block truncate max-w-[160px]">
                                                        {compra.patient ? `${compra.patient.split(' ')[0]} - ` : ''}{compra.pharmacy || 'Farmácia não informada'}
                                                    </span>
                                                </div>
                                            </div>
                                            <button onClick={() => setSelectedPurchase(compra)} className="h-10 w-10 bg-slate-900 text-white rounded-xl flex items-center justify-center active:scale-90 transition-all shadow-md ml-2">
                                                <IconPlus />
                                            </button>
                                        </div>
                                    ))}

                                    {replenishments.length === 0 && (
                                        <div className="text-center py-10 opacity-50">
                                            <div className="flex justify-center mb-2 text-slate-400"><IconBag /></div>
                                            <p className="text-xs font-bold text-slate-500">Nenhuma compra registrada.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODAL: REGISTRAR/EDITAR COMPRA */}
                    {showSupplyModal && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-6 bg-slate-900/90 backdrop-blur-md">
                            <div className="bg-white w-full max-w-sm rounded-t-[3rem] sm:rounded-[3rem] p-8 shadow-2xl border-t-8 border-emerald-500 max-h-[90vh] overflow-y-auto animate-fade">
                                <h2 className="text-xl font-black text-center italic mb-6 uppercase text-slate-800">{supplyData.id ? 'Editar Compra' : 'Nova Compra'}</h2>
                                
                                <div className="space-y-4 mb-8">
                                    <div className="bg-emerald-50/50 p-4 rounded-3xl border border-emerald-100">
                                        <label className="text-[10px] font-black text-emerald-600 uppercase tracking-widest ml-2 block mb-2">Quantidade (Cápsulas)*</label>
                                        <input type="number" placeholder="0" className="w-full text-4xl font-black text-center bg-transparent border-none text-emerald-600 outline-none placeholder:text-emerald-200" value={supplyData.amount} onFocus={onInputFocus} onBlur={onInputBlur} onChange={e=>setSupplyData({...supplyData, amount: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 block mb-1">Data da Compra</label>
                                        <input type="date" className="w-full font-bold bg-slate-50 border border-slate-100 rounded-2xl p-4 text-slate-700 outline-none focus:ring-2 focus:ring-emerald-400" value={supplyData.date} onFocus={onInputFocus} onBlur={onInputBlur} onChange={e=>setSupplyData({...supplyData, date: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 block mb-1">Paciente (Opcional)</label>
                                        <input type="text" placeholder="Nome do paciente" className="w-full font-bold bg-slate-50 border border-slate-100 rounded-2xl p-4 text-slate-700 outline-none focus:ring-2 focus:ring-emerald-400" value={supplyData.patient} onFocus={onInputFocus} onBlur={onInputBlur} onChange={e=>setSupplyData({...supplyData, patient: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 block mb-1">Farmácia (Opcional)</label>
                                        <input type="text" placeholder="Nome da farmácia" className="w-full font-bold bg-slate-50 border border-slate-100 rounded-2xl p-4 text-slate-700 outline-none focus:ring-2 focus:ring-emerald-400" value={supplyData.pharmacy} onFocus={onInputFocus} onBlur={onInputBlur} onChange={e=>setSupplyData({...supplyData, pharmacy: e.target.value})} />
                                    </div>
                                </div>

                                <div className="flex space-x-3">
                                    <button onClick={()=>setShowSupplyModal(false)} className="flex-1 py-4 text-xs font-black text-slate-400 uppercase bg-slate-100 rounded-2xl active:scale-95 transition-all">Cancelar</button>
                                    <button onClick={handleSupply} className="flex-[2] py-4 bg-emerald-600 text-white text-xs font-black rounded-2xl uppercase shadow-lg shadow-emerald-500/30 active:scale-95 transition-all">Salvar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: DETALHES DA COMPRA (C/ Editar e Excluir) */}
                    {selectedPurchase && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-md">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl border-t-8 border-emerald-500 animate-fade">
                                <div className="flex justify-between items-start mb-6">
                                    <h2 className="text-xl font-black italic uppercase text-slate-800">Recibo de Entrada</h2>
                                    <button onClick={() => setSelectedPurchase(null)} className="text-slate-400 hover:text-slate-600 p-2"><IconX /></button>
                                </div>
                                
                                <div className="space-y-4 mb-8 bg-slate-50 p-6 rounded-3xl border border-slate-100">
                                    <div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Data</p>
                                        {/* Correção do timezone: Adicionado T12:00:00 */}
                                        <p className="text-sm font-bold text-slate-800">{new Date(selectedPurchase.date + 'T12:00:00').toLocaleDateString('pt-BR')}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Quantidade</p>
                                        <p className="text-2xl font-black text-emerald-600">{selectedPurchase.amount} Cápsulas</p>
                                    </div>
                                    <div className="pt-2 border-t border-slate-200 border-dashed">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Paciente</p>
                                        <p className="text-sm font-bold text-slate-800">{selectedPurchase.patient || 'Não informado'}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Farmácia</p>
                                        <p className="text-sm font-bold text-slate-800">{selectedPurchase.pharmacy || 'Não informada'}</p>
                                    </div>
                                </div>

                                <div className="flex space-x-3">
                                    <button onClick={() => deletePurchase(selectedPurchase.id)} className="flex-1 py-4 bg-rose-50 text-rose-600 text-xs font-black rounded-2xl uppercase flex items-center justify-center active:scale-95 transition-all">
                                        <span className="mr-2"><IconTrash /></span> Excluir
                                    </button>
                                    <button onClick={() => handleEditPurchase(selectedPurchase)} className="flex-1 py-4 bg-slate-900 text-white text-xs font-black rounded-2xl uppercase flex items-center justify-center active:scale-95 transition-all">
                                        <span className="mr-2"><IconPencil /></span> Editar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: DETALHES DE PASSADAS (LOGS) */}
                    {selectedLog && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-md">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl border-t-8 border-indigo-500 animate-fade">
                                <div className="flex justify-between items-start mb-6">
                                    <h2 className="text-xl font-black italic uppercase text-slate-800">Detalhes do Dia</h2>
                                    <button onClick={() => setSelectedLog(null)} className="text-slate-400 hover:text-slate-600 p-2"><IconX /></button>
                                </div>

                                {isEditingLog ? (
                                    <div className="space-y-4 mb-8">
                                        <div className="bg-indigo-50 p-4 rounded-3xl border border-indigo-100 flex space-x-2">
                                            <div className="flex-1">
                                                <label className="text-[10px] font-black text-indigo-600 uppercase tracking-widest block mb-2 text-center">Dose 1</label>
                                                <input type="number" placeholder="-" className="w-full text-2xl font-black text-center bg-white border border-indigo-100 rounded-xl py-3 text-indigo-600 outline-none focus:ring-2 focus:ring-indigo-300" value={editLogData.d1} onFocus={onInputFocus} onBlur={onInputBlur} onChange={e=>setEditLogData({...editLogData, d1: e.target.value})} />
                                            </div>
                                            <div className="flex-1">
                                                <label className="text-[10px] font-black text-indigo-600 uppercase tracking-widest block mb-2 text-center">Dose 2</label>
                                                <input type="number" placeholder="-" className="w-full text-2xl font-black text-center bg-white border border-indigo-100 rounded-xl py-3 text-indigo-600 outline-none focus:ring-2 focus:ring-indigo-300" value={editLogData.d2} onFocus={onInputFocus} onBlur={onInputBlur} onChange={e=>setEditLogData({...editLogData, d2: e.target.value})} />
                                            </div>
                                            <div className="flex-1">
                                                <label className="text-[10px] font-black text-indigo-600 uppercase tracking-widest block mb-2 text-center">Dose 3</label>
                                                <input type="number" placeholder="-" className="w-full text-2xl font-black text-center bg-white border border-indigo-100 rounded-xl py-3 text-indigo-600 outline-none focus:ring-2 focus:ring-indigo-300" value={editLogData.d3} onFocus={onInputFocus} onBlur={onInputBlur} onChange={e=>setEditLogData({...editLogData, d3: e.target.value})} />
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-4 mb-8 bg-slate-50 p-6 rounded-3xl border border-slate-100">
                                        <div>
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Data do Lançamento</p>
                                            {/* Correção do timezone: Adicionado T12:00:00 */}
                                            <p className="text-sm font-bold text-slate-800 capitalize">{new Date(selectedLog.data + 'T12:00:00').toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' })}</p>
                                        </div>
                                        <div className="grid grid-cols-3 gap-2 pt-4">
                                            <div className="bg-white border border-slate-200 rounded-xl p-2 text-center">
                                                <span className="text-[8px] font-black text-slate-400 uppercase">D1</span>
                                                <p className="font-black text-slate-800">{selectedLog.d1 || '-'}</p>
                                            </div>
                                            <div className="bg-white border border-slate-200 rounded-xl p-2 text-center">
                                                <span className="text-[8px] font-black text-slate-400 uppercase">D2</span>
                                                <p className="font-black text-slate-800">{selectedLog.d2 || '-'}</p>
                                            </div>
                                            <div className="bg-white border border-slate-200 rounded-xl p-2 text-center">
                                                <span className="text-[8px] font-black text-slate-400 uppercase">D3</span>
                                                <p className="font-black text-slate-800">{selectedLog.d3 || '-'}</p>
                                            </div>
                                        </div>
                                        <div className="pt-4 border-t border-slate-200 border-dashed text-center">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total do Dia</p>
                                            <p className="text-3xl font-black text-indigo-600">{(Number(selectedLog.d1)||0) + (Number(selectedLog.d2)||0) + (Number(selectedLog.d3)||0)}</p>
                                        </div>
                                    </div>
                                )}

                                {isEditingLog ? (
                                    <div className="flex space-x-3">
                                        <button onClick={() => setIsEditingLog(false)} className="flex-1 py-4 text-xs font-black text-slate-400 uppercase bg-slate-100 rounded-2xl active:scale-95 transition-all">Cancelar</button>
                                        <button onClick={saveLogEdit} className="flex-[2] py-4 bg-indigo-600 text-white text-xs font-black rounded-2xl uppercase shadow-lg shadow-indigo-500/30 active:scale-95 transition-all">Salvar</button>
                                    </div>
                                ) : (
                                    <div className="flex space-x-3">
                                        <button onClick={() => deleteLogRecord(selectedLog.data)} className="flex-1 py-4 bg-rose-50 text-rose-600 text-xs font-black rounded-2xl uppercase flex items-center justify-center active:scale-95 transition-all">
                                            <span className="mr-2"><IconTrash /></span> Excluir
                                        </button>
                                        <button onClick={() => startEditingLog(selectedLog)} className="flex-1 py-4 bg-slate-900 text-white text-xs font-black rounded-2xl uppercase flex items-center justify-center active:scale-95 transition-all">
                                            <span className="mr-2"><IconPencil /></span> Editar
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* MENU INFERIOR - Nova Ordem e Controle de Teclado Rígido */}
                    <nav className={`fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-2xl border-t border-slate-100 flex justify-between items-center py-2 px-4 sm:px-6 pb-10 shadow-2xl z-40 transition-transform duration-300 ${isKeyboardVisible ? 'translate-y-full opacity-0 pointer-events-none' : 'translate-y-0 opacity-100'}`}>
                        <button onClick={()=>setActiveTab('dashboard')} className={`flex flex-col items-center p-2 sm:p-3 rounded-2xl sm:rounded-3xl transition-all ${activeTab === 'dashboard' ? 'tab-active' : 'text-slate-400'}`}><IconHome /><span className="text-[8px] sm:text-[9px] mt-1 uppercase">Início</span></button>
                        <button onClick={()=>setActiveTab('agenda')} className={`flex flex-col items-center p-2 sm:p-3 rounded-2xl sm:rounded-3xl transition-all ${activeTab === 'agenda' ? 'tab-active' : 'text-slate-400'}`}><IconTable /><span className="text-[8px] sm:text-[9px] mt-1 uppercase">Lançar</span></button>
                        <button onClick={()=>setActiveTab('history')} className={`flex flex-col items-center p-2 sm:p-3 rounded-2xl sm:rounded-3xl transition-all ${activeTab === 'history' ? 'tab-active' : 'text-slate-400'}`}><IconHistory /><span className="text-[8px] sm:text-[9px] mt-1 uppercase">Passadas</span></button>
                        <button onClick={()=>setActiveTab('purchases')} className={`flex flex-col items-center p-2 sm:p-3 rounded-2xl sm:rounded-3xl transition-all ${activeTab === 'purchases' ? 'tab-active' : 'text-slate-400'}`}><IconBag /><span className="text-[8px] sm:text-[9px] mt-1 uppercase">Compras</span></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
