<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#27272a">
    
    <link rel="manifest" href='data:application/manifest+json,%7B%22name%22%3A%22App%20Med%22%2C%22short_name%22%3A%22App%20Med%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%2327272a%22%2C%22theme_color%22%3A%22%2327272a%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22med.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D'>
    
    <title>App Med - Gestão Cloud</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
            background-color: #fafaf9; 
            background-image: 
                radial-gradient(at 0% 0%, hsla(162, 60%, 92%, 1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(250, 60%, 94%, 1) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .tab-active { transform: scale(1.1); color: #0d9488; font-weight: 900; filter: drop-shadow(0 4px 6px rgba(20, 184, 166, 0.2)); }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg fill='%2352525b' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>"); background-repeat: no-repeat; background-position-x: 95%; background-position-y: 50%; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="text-zinc-800">
    <div id="root"></div>

    <!-- Registro de Service Worker para habilitar Instalação -->
    <script>
        if ('serviceWorker' in navigator) {
            // Usando Data URI em Base64 para evitar erros de protocolo Blob
            const swContent = 'self.addEventListener("fetch", (event) => { event.respondWith(fetch(event.request)); });';
            const swEncoded = btoa(swContent);
            navigator.serviceWorker.register('data:application/javascript;base64,' + swEncoded)
                .then(() => console.log('SW Habilitado'))
                .catch(err => console.log('Erro SW:', err));
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Configuração Global & Firebase ---
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'medicacao-afb43';
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyCVuPb0tji1Xd3qgzGsAVW-X4GyRwQpSdo",
                authDomain: "medicacao-afb43.firebaseapp.com",
                projectId: "medicacao-afb43",
                storageBucket: "medicacao-afb43.firebasestorage.app",
                messagingSenderId: "106132279676",
                appId: "1:106132279676:web:eb94017be76a71f67b14f9"
            };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        db.enablePersistence({ synchronizeTabs: true }).catch((err) => {
            console.warn('Persistência Offline:', err.code);
        });

        // --- Ícones ---
        const IconHome = () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
        const IconTable = () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none"><path d="M12 3v18"></path><rect width="18" height="18" x="3" y="3" rx="2"></rect><path d="M3 9h18"></path><path d="M3 15h18"></path></svg>;
        const IconHistory = () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>;
        const IconPlus = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconCheck = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconCloud = () => <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" strokeWidth="2" fill="none"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.4-1.9-4.3-4.2-4.5C17.3 6.6 14.4 4 11 4 7.6 4 4.8 6.6 4.2 10.1 1.9 10.3 0 12.3 0 14.7 0 17.1 1.9 19 4.3 19h13.2Z"/></svg>;
        const IconX = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const IconBag = () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><path d="M3 6h18"></path><path d="M16 10a4 4 0 0 1-8 0"></path></svg>;
        const IconDownload = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const IconUpload = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
        const IconInsertRow = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M12 4v16M4 12h16"></path></svg>;
        const IconDeleteRow = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M4 12h16"></path></svg>;
        const IconMinus = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconLogout = () => <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="3" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;
        const IconAlertCircle = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        const IconGoogle = () => <svg viewBox="0 0 24 24" width="18" height="18"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>;
        const IconDevice = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>;

        const ToastComponent = ({ toast }) => {
            if (!toast) return null;
            const isError = toast.type === 'error';
            return (
                <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[200] animate-slide-up w-full max-w-xs px-4">
                    <div className={`flex items-center p-4 rounded-2xl shadow-xl border ${isError ? 'bg-rose-50 border-rose-200 text-rose-600' : 'bg-teal-50 border-teal-200 text-teal-700'}`}>
                        {isError ? <IconAlertCircle /> : <IconCheck />}
                        <span className="ml-3 font-bold text-sm leading-tight">{toast.message}</span>
                    </div>
                </div>
            );
        };

        const ManualBarChart = ({ data }) => {
            const maxVal = Math.max(...data.map(d => d.Total), 1);
            return (
                <div className="flex items-end justify-between h-full pt-2 pb-2 px-1 gap-1">
                    {data.map((d, i) => (
                        <div key={i} className="flex flex-col items-center justify-end h-full flex-1 min-w-0">
                            <span className="text-[10px] font-black text-zinc-700 mb-1 truncate w-full text-center">{d.Total > 0 ? d.Total : ''}</span>
                            <div className="w-full max-w-[28px] rounded-t-sm transition-all duration-500"
                                style={{ height: `${(d.Total / maxVal) * 100}%`, backgroundColor: d.isSpecial ? '#a78bfa' : (d.Total > 0 ? '#14b8a6' : '#f5f5f4'), minHeight: d.Total > 0 ? '6px' : '3px' }}>
                            </div>
                            <span className={`text-[10px] font-bold ${d.isSpecial ? 'text-violet-400' : 'text-zinc-400'} mt-1 truncate w-full text-center`}>{d.name}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const App = () => {
            const estoqueInicialBase = 54;
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [emailInput, setEmailInput] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [isRegisterMode, setIsRegisterMode] = useState(false);
            const [authError, setAuthError] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [status, setStatus] = useState('Offline'); 
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('tramal_app_final_logs') || '{}'));
            const [replenishments, setReplenishments] = useState(() => JSON.parse(localStorage.getItem('tramal_app_final_supply') || '[]'));
            const [chartType, setChartType] = useState('weekly');
            const [isKeyboardVisible, setIsKeyboardVisible] = useState(false);
            const [forceShowNav, setForceShowNav] = useState(false);
            const [showSupplyModal, setShowSupplyModal] = useState(false);
            const [supplyData, setSupplyData] = useState({ id: null, amount: '', date: '', isScheduled: false });
            const [toast, setToast] = useState(null);
            const [deferredPrompt, setDeferredPrompt] = useState(null);

            const keyboardTimeoutRef = useRef(null);
            const fileInputRef = useRef(null);
            const todayRowRef = useRef(null);
            const toastTimeout = useRef(null);

            const getTodayDateStr = () => {
                const d = new Date();
                return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
            };

            const calendarDays = useMemo(() => {
                const days = [];
                for (let i = -3; i <= 60; i++) {
                    const d = new Date(); d.setDate(d.getDate() + i);
                    const dateStr = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
                    days.push({ 
                        dateStr, 
                        label: new Date(dateStr + 'T12:00:00').toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit' }), 
                        weekday: new Date(dateStr + 'T12:00:00').toLocaleDateString('pt-PT', { weekday: 'short' }).replace('.', '').slice(0,3), 
                        isToday: i === 0, 
                        isPast: i < 0 
                    });
                }
                return days;
            }, []);

            const statsCalculated = useMemo(() => {
                const allEntries = Object.values(logs);
                const totalSaidaGeral = allEntries.reduce((acc, curr) => acc + (Number(curr.d1) || 0) + (Number(curr.d2) || 0) + (Number(curr.d3) || 0), 0);
                const todayStr = getTodayDateStr();
                const totalSaidaAteHoje = allEntries.reduce((acc, curr) => curr.data <= todayStr ? acc + (Number(curr.d1) || 0) + (Number(curr.d2) || 0) + (Number(curr.d3) || 0) : acc, 0);
                const totalEntrada = replenishments.reduce((acc, curr) => acc + (curr.isScheduled ? 0 : (Number(curr.amount) || 0)), 0);
                return { previsao: estoqueInicialBase + totalEntrada - totalSaidaGeral, estoque: estoqueInicialBase + totalEntrada - totalSaidaAteHoje, totalEntrada };
            }, [logs, replenishments]);

            const chartDataCalculated = useMemo(() => {
                let data = []; let totalGeral = 0;
                const today = new Date(); today.setHours(0,0,0,0);
                const getVal = (ds) => { const l = logs[ds]; return l ? (Number(l.d1)||0)+(Number(l.d2)||0)+(Number(l.d3)||0) : 0; };

                if (chartType === 'weekly') {
                    for (let i = 7; i >= 0; i--) { 
                        let d = new Date(today); d.setDate(d.getDate() - i); 
                        let ds = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
                        let val = getVal(ds);
                        data.push({ name: d.toLocaleDateString('pt-PT', { weekday: 'short' }).slice(0,3), Total: val });
                        totalGeral += val;
                    }
                }
                return { data, total: totalGeral };
            }, [logs, chartType]);

            const historyItemsCalculated = useMemo(() => {
                const todayStr = getTodayDateStr();
                return Object.values(logs)
                    .filter(l => l.data < todayStr && ((Number(l.d1)||0) + (Number(l.d2)||0) + (Number(l.d3)||0)) > 0)
                    .sort((a, b) => b.data.localeCompare(a.data));
            }, [logs]);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                if (toastTimeout.current) clearTimeout(toastTimeout.current);
                toastTimeout.current = setTimeout(() => setToast(null), 3000);
            };

            const isMobileDevice = () => /Android|iPhone|iPad/i.test(navigator.userAgent);

            const updateCloud = (updates) => {
                if (!user) return;
                db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('profile').set({ 
                    logs: updates.logs || logs, 
                    replenishments: updates.replenishments || replenishments,
                    lastUpdate: new Date().toISOString()
                }, { merge: true }).then(() => setStatus('Sincronizado ✅')).catch(() => setStatus('Offline 🔋'));
            };

            const handleAuth = async (e) => {
                e.preventDefault(); setAuthError('');
                try {
                    if (isRegisterMode) await auth.createUserWithEmailAndPassword(emailInput, passwordInput);
                    else await auth.signInWithEmailAndPassword(emailInput, passwordInput);
                    showToast("Sucesso!");
                } catch (err) { setAuthError('Dados inválidos.'); }
            };

            const handleLogout = () => auth.signOut();

            const handleSupply = () => {
                if (!supplyData.amount) return;
                let updated = supplyData.id 
                    ? replenishments.map(r => r.id === supplyData.id ? { ...r, amount: Number(supplyData.amount), date: supplyData.date, isScheduled: supplyData.isScheduled } : r)
                    : [...replenishments, { ...supplyData, amount: Number(supplyData.amount), date: supplyData.date || getTodayDateStr(), id: Date.now() }];
                setReplenishments(updated); updateCloud({ replenishments: updated }); setShowSupplyModal(false);
                showToast("Guardado!");
            };

            const handleInputChange = (dateStr, field, value) => {
                const curr = logs[dateStr] || { d1: '', d2: '', d3: '', data: dateStr };
                const updatedLogs = {...logs, [dateStr]: { ...curr, [field]: value === '' ? '' : Number(value) }};
                setLogs(updatedLogs); updateCloud({ logs: updatedLogs });
            };

            const handleKeyDown = (e, dayIdx, doseNum) => {
                const keys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
                if (!keys.includes(e.key)) return;
                let nDay = dayIdx, nDose = doseNum;
                if (e.key === 'ArrowRight') { if (nDose < 3) nDose++; else if (nDay < calendarDays.length - 1) { nDay++; nDose = 1; } }
                else if (e.key === 'ArrowLeft') { if (nDose > 1) nDose--; else if (nDay > 0) { nDay--; nDose = 3; } }
                else if (e.key === 'ArrowDown' && nDay < calendarDays.length - 1) nDay++;
                else if (e.key === 'ArrowUp' && nDay > 0) nDay--;

                if (nDay !== dayIdx || nDose !== doseNum) {
                    e.preventDefault();
                    const target = document.getElementById(`dose-${calendarDays[nDay].dateStr}-${nDose}`);
                    if (target) target.focus();
                }
            };

            const handleInstallApp = async () => { 
                if (deferredPrompt) { 
                    deferredPrompt.prompt(); 
                    const { outcome } = await deferredPrompt.userChoice; 
                    if (outcome === 'accepted') setDeferredPrompt(null); 
                } else {
                    showToast("Use o menu do navegador: 'Adicionar ao ecrã inicial'", "error");
                }
            };

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => { setUser(u); setAuthLoading(false); });
                const handlePrompt = (e) => { e.preventDefault(); setDeferredPrompt(e); };
                window.addEventListener('beforeinstallprompt', handlePrompt);
                return () => { unsub(); window.removeEventListener('beforeinstallprompt', handlePrompt); };
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('profile')
                .onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        if (d.logs) setLogs(d.logs);
                        if (d.replenishments) setReplenishments(d.replenishments);
                        setStatus('Online ✅');
                    }
                });
                return () => unsub();
            }, [user]);

            if (authLoading) return <div className="min-h-screen bg-zinc-800 flex items-center justify-center"><div className="w-10 h-10 border-4 border-teal-400 border-t-transparent rounded-full animate-spin"></div></div>;

            if (!user) return (
                <div className="min-h-screen bg-zinc-800 flex flex-col items-center justify-center p-6 text-center">
                    <div className="w-full max-w-xs space-y-8">
                        <img src="med.png" className="w-24 h-24 mx-auto" alt="Logo" onError={e => e.target.src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png"} />
                        <h1 className="text-4xl font-black italic text-white">APP MED</h1>
                        <form onSubmit={handleAuth} className="space-y-4">
                            <input type="email" required className="w-full bg-zinc-700 border-2 border-zinc-600 rounded-2xl p-4 text-white outline-none focus:border-teal-400" value={emailInput} onChange={e => setEmailInput(e.target.value)} placeholder="Email" />
                            <input type="password" required className="w-full bg-zinc-700 border-2 border-zinc-600 rounded-2xl p-4 text-white outline-none focus:border-teal-400" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="Senha" />
                            <button type="submit" className="w-full py-5 bg-teal-500 text-white font-black rounded-2xl uppercase tracking-widest">{isRegisterMode ? 'Registar' : 'Entrar'}</button>
                        </form>
                        <button onClick={() => setIsRegisterMode(!isRegisterMode)} className="text-zinc-400 text-xs uppercase">{isRegisterMode ? 'Já tenho conta' : 'Criar conta'}</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col pb-32">
                    <ToastComponent toast={toast} />
                    <header className="bg-zinc-800 text-white pt-8 pb-10 px-6 rounded-b-[3.5rem] sticky top-0 z-40 border-b-4 border-teal-400">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <div className="flex items-center">
                                <img src="med.png" className="w-10 h-10 mr-3" alt="Logo" onError={e => e.target.src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png"} />
                                <div><h1 className="text-2xl font-black italic leading-none">APP MED</h1><div className="flex items-center text-[10px] uppercase text-teal-400 font-bold"><IconCloud /><span className="ml-1">{status}</span><button onClick={handleLogout} className="ml-2 text-rose-400"><IconLogout /></button></div></div>
                            </div>
                            <div className="bg-teal-500/10 border border-teal-400/50 p-3 px-5 rounded-[2rem] text-center">
                                <span className="block text-[8px] font-black uppercase opacity-70">Previsão</span>
                                <span className="text-3xl font-black text-teal-300 leading-none">{statsCalculated.previsao}</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto px-4 -mt-4 relative z-10 w-full">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-4 animate-fade">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-sm text-center">
                                    <p className="text-zinc-400 text-[10px] font-black uppercase">Estoque Real</p>
                                    <p className="text-6xl font-black text-teal-500 my-2">{statsCalculated.estoque}</p>
                                    <button onClick={() => { setSupplyData({ id: null, amount: '', date: getTodayDateStr(), isScheduled: false }); setShowSupplyModal(true); }} className="bg-zinc-800 text-white py-4 rounded-2xl font-black w-full flex items-center justify-center"><IconPlus /><span className="ml-2">COMPRAR</span></button>
                                </div>
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-sm">
                                    <h3 className="text-[10px] font-black text-zinc-400 uppercase mb-4">Consumo Semanal</h3>
                                    <div className="h-40"><ManualBarChart data={chartDataCalculated.data} /></div>
                                </div>
                                {deferredPrompt && (
                                    <button onClick={handleInstallApp} className="w-full py-5 bg-violet-600 text-white rounded-[2rem] font-black uppercase tracking-widest flex items-center justify-center shadow-lg"><IconDevice /><span className="ml-2">Instalar Aplicativo</span></button>
                                )}
                            </div>
                        )}

                        {activeTab === 'agenda' && (
                            <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden animate-fade">
                                <div className="p-5 bg-zinc-800 text-white flex justify-between items-center"><h2 className="text-[10px] font-black uppercase tracking-widest text-teal-300">Grade de Lançamento</h2></div>
                                <div className="space-y-2 max-h-[60vh] overflow-y-auto p-2 pb-10 scrollbar-hide">
                                    {calendarDays.map((day, idx) => {
                                        const log = logs[day.dateStr] || { d1: '', d2: '', d3: '' };
                                        const total = (Number(log.d1)||0)+(Number(log.d2)||0)+(Number(log.d3)||0);
                                        return (
                                            <div key={day.dateStr} ref={day.isToday ? todayRowRef : null} className={`flex items-center gap-1.5 p-2 rounded-[1.25rem] border ${day.isToday ? 'bg-teal-50 border-teal-200' : 'bg-white'}`}>
                                                <div className="w-6 flex flex-col gap-1"><button onClick={() => { const nl = {...logs}; nl[day.dateStr] = {d1:'',d2:'',d3:'',data:day.dateStr}; setLogs(nl); updateCloud({logs:nl}); }} className="bg-stone-100 p-1 rounded text-stone-400"><IconX /></button></div>
                                                <div className={`h-11 w-10 rounded-[0.8rem] flex flex-col items-center justify-center shrink-0 font-black border ${day.isToday ? 'bg-teal-500 text-white' : 'bg-stone-50 text-stone-500'}`}><span className="text-[9px] uppercase leading-none">{day.weekday}</span><span className="text-lg leading-none">{day.label.split('/')[0]}</span></div>
                                                <div className="flex-1 flex justify-center gap-1.5">{[1,2,3].map(n => (
                                                    <input key={n} id={`dose-${day.dateStr}-${n}`} type="number" placeholder="-" className="w-full max-w-[40px] h-10 text-center rounded-[0.8rem] font-black border bg-white/60 focus:bg-white focus:border-teal-400 outline-none transition-colors" value={log[`d${n}`]} onFocus={()=>setIsKeyboardVisible(true)} onBlur={()=>setIsKeyboardVisible(false)} onKeyDown={e=>handleKeyDown(e, idx, n)} onChange={e=>handleInputChange(day.dateStr, `d${n}`, e.target.value)} />
                                                ))}</div>
                                                <div className="w-8 flex justify-center"><span className={`flex items-center justify-center h-8 w-8 text-xs font-black rounded-xl ${total > 0 ? 'bg-zinc-800 text-white' : 'bg-stone-100 text-stone-300'}`}>{total || '-'}</span></div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-3 animate-fade">
                                <h2 className="text-[10px] font-black text-zinc-400 uppercase italic ml-2">Histórico</h2>
                                {historyItemsCalculated.map(l => {
                                    const total = (Number(l.d1)||0)+(Number(l.d2)||0)+(Number(l.d3)||0);
                                    return (
                                        <div key={l.data} className="flex items-center gap-2 p-3 bg-white rounded-[1.25rem] border shadow-sm">
                                            <div className="h-11 w-10 rounded-[0.8rem] flex flex-col items-center justify-center bg-stone-100 text-stone-500 border"><span className="text-lg font-black">{l.data.split('-')[2]}</span></div>
                                            <div className="flex-1 flex justify-around font-black text-teal-600 text-lg"><span>{l.d1||0}</span><span>{l.d2||0}</span><span>{l.d3||0}</span></div>
                                            <div className="w-10 flex justify-center"><span className="bg-stone-800 text-white text-xs font-black p-2 px-3 rounded-xl">{total}</span></div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {activeTab === 'purchases' && (
                            <div className="space-y-3 animate-fade">
                                <div className="flex justify-between items-center px-2"><h2 className="text-[10px] font-black text-zinc-400 uppercase">Compras</h2><button onClick={() => { setSupplyData({ id: null, amount: '', date: getTodayDateStr(), isScheduled: true }); setShowSupplyModal(true); }} className="text-amber-600 text-[10px] font-black uppercase">Agendar</button></div>
                                {replenishments.sort((a,b) => b.date.localeCompare(a.date)).map(c => (
                                    <div key={c.id} className={`p-4 rounded-[2rem] border flex items-center justify-between ${c.isScheduled ? 'bg-amber-50 border-amber-100' : 'bg-white border-stone-100'}`}>
                                        <div className="flex items-center">
                                            <div className={`h-12 w-12 rounded-2xl flex flex-col items-center justify-center mr-4 font-black ${c.isScheduled ? 'bg-amber-100 text-amber-600' : 'bg-teal-50 text-teal-600'}`}>
                                                <span className="text-[9px] uppercase leading-none">{new Date(c.date + 'T12:00:00').toLocaleDateString('pt-PT', { month: 'short' })}</span>
                                                <span className="text-lg">{c.date.split('-')[2]}</span>
                                            </div>
                                            <div><p className={`font-black ${c.isScheduled ? 'text-amber-600' : 'text-teal-600'}`}>{c.amount} Caps</p><span className="text-[8px] uppercase font-bold text-zinc-400">{c.isScheduled ? 'Agendado' : 'Recebido'}</span></div>
                                        </div>
                                        <div className="flex gap-2">
                                            {c.isScheduled && <button onClick={() => { const u = replenishments.map(r=>r.id===c.id?{...r,isScheduled:false}:r); setReplenishments(u); updateCloud({replenishments:u}); }} className="p-2 px-3 bg-teal-500 text-white rounded-xl text-[9px] font-black uppercase">OK</button>}
                                            <button onClick={() => { const u = replenishments.filter(r=>r.id!==c.id); setReplenishments(u); updateCloud({replenishments:u}); }} className="p-2 bg-rose-50 text-rose-500 rounded-xl"><IconX /></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {showSupplyModal && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-zinc-900/80 backdrop-blur-sm animate-fade">
                            <div className="bg-white w-full max-w-sm rounded-t-[3rem] sm:rounded-[3rem] p-8 shadow-2xl animate-slide-up">
                                <h2 className="text-xl font-black text-center mb-6 uppercase">Registo de Cápsulas</h2>
                                <div className="space-y-4 mb-8">
                                    <div className="bg-stone-50 p-4 rounded-3xl border text-center">
                                        <label className="text-[10px] font-black uppercase text-zinc-400 mb-2 block">Quantidade</label>
                                        <input type="number" className="w-full text-4xl font-black text-center bg-transparent outline-none text-teal-600" value={supplyData.amount} onChange={e=>setSupplyData({...supplyData, amount: e.target.value})} placeholder="0" />
                                    </div>
                                    <input type="date" className="w-full p-4 bg-stone-50 border rounded-2xl font-bold" value={supplyData.date} onChange={e=>setSupplyData({...supplyData, date: e.target.value})} />
                                </div>
                                <div className="flex gap-3"><button onClick={()=>setShowSupplyModal(false)} className="flex-1 py-4 text-zinc-400 font-black">Voltar</button><button onClick={handleSupply} className="flex-[2] py-4 bg-teal-500 text-white rounded-2xl font-black shadow-lg">GUARDAR</button></div>
                            </div>
                        </div>
                    )}

                    <nav className={`fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-2xl border-t flex justify-around py-3 px-4 pb-10 z-40 transition-transform ${isKeyboardVisible ? 'translate-y-full' : 'translate-y-0'}`}>
                        <button onClick={()=>setActiveTab('dashboard')} className={`p-2 ${activeTab==='dashboard'?'text-teal-600 scale-110':'text-zinc-300'}`}><IconHome /></button>
                        <button onClick={()=>setActiveTab('agenda')} className={`p-2 ${activeTab==='agenda'?'text-teal-600 scale-110':'text-zinc-300'}`}><IconTable /></button>
                        <button onClick={()=>setActiveTab('history')} className={`p-2 ${activeTab==='history'?'text-teal-600 scale-110':'text-zinc-300'}`}><IconHistory /></button>
                        <button onClick={()=>setActiveTab('purchases')} className={`p-2 ${activeTab==='purchases'?'text-teal-600 scale-110':'text-zinc-300'}`}><IconBag /></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
